<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="PolyLingua – Traducteur instantané multilingue gratuit. Traduisez facilement dans plus de 20 langues.">
  <title>PolyLingua 🌐 – Traducteur Universel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Animated Background -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🌐</span>
        <h1>PolyLingua</h1>
      </div>
      <p class="tagline">Traducteur universel instantané</p>
    </header>

    <!-- Translator Card -->
    <main class="card">

      <!-- Source section -->
      <section class="panel panel-source">
        <div class="panel-header">
          <label for="sourceLang" class="panel-label">De&nbsp;:</label>
          <div class="select-wrapper">
            <select id="sourceLang" aria-label="Langue source">
              <option value="auto">🔍 Détection auto</option>
              <optgroup label="─── Populaires ───">
                <option value="fr">🇫🇷 Français</option>
                <option value="en">🇬🇧 Anglais</option>
                <option value="es">🇪🇸 Espagnol</option>
                <option value="de">🇩🇪 Allemand</option>
                <option value="it">🇮🇹 Italien</option>
                <option value="pt">🇵🇹 Portugais</option>
                <option value="ru">🇷🇺 Russe</option>
                <option value="zh">🇨🇳 Chinois</option>
                <option value="ja">🇯🇵 Japonais</option>
                <option value="ko">🇰🇷 Coréen</option>
                <option value="ar">🇸🇦 Arabe</option>
              </optgroup>
              <optgroup label="─── Autres ───">
                <option value="nl">🇳🇱 Néerlandais</option>
                <option value="pl">🇵🇱 Polonais</option>
                <option value="sv">🇸🇪 Suédois</option>
                <option value="tr">🇹🇷 Turc</option>
                <option value="vi">🇻🇳 Vietnamien</option>
                <option value="th">🇹🇭 Thaï</option>
                <option value="hi">🇮🇳 Hindi</option>
                <option value="he">🇮🇱 Hébreu</option>
                <option value="uk">🇺🇦 Ukrainien</option>
                <option value="ro">🇷🇴 Roumain</option>
                <option value="cs">🇨🇿 Tchèque</option>
                <option value="hu">🇭🇺 Hongrois</option>
                <option value="id">🇮🇩 Indonésien</option>
                <option value="da">🇩🇰 Danois</option>
                <option value="fi">🇫🇮 Finnois</option>
                <option value="el">🇬🇷 Grec</option>
                <option value="no">🇳🇴 Norvégien</option>
                <option value="sk">🇸🇰 Slovaque</option>
                <option value="bg">🇧🇬 Bulgare</option>
                <option value="hr">🇭🇷 Croate</option>
                <option value="ms">🇲🇾 Malais</option>
                <option value="fa">🇮🇷 Persan</option>
                <option value="bn">🇧🇩 Bengali</option>
                <option value="ca">🏴 Catalan</option>
              </optgroup>
            </select>
            <span class="select-arrow">▾</span>
          </div>
        </div>

        <div class="textarea-wrapper">
          <textarea id="sourceText" placeholder="Écris ou colle ton texte ici…" maxlength="5000"
            aria-label="Texte source à traduire"></textarea>
          <div class="textarea-tools">
            <span id="charCount" class="char-count">0 / 5000</span>
            <button id="clearBtn" class="icon-btn" title="Effacer" aria-label="Effacer le texte">✕</button>
            <button id="copySourceBtn" class="icon-btn" title="Copier" aria-label="Copier le texte source">📋</button>
          </div>
        </div>

        <!-- Auto-detect badge -->
        <div id="detectedLang" class="detected-badge" aria-live="polite" hidden></div>
      </section>

      <!-- Swap Button -->
      <div class="swap-container">
        <button id="swapBtn" class="swap-btn" title="Inverser les langues" aria-label="Inverser les langues">
          <span class="swap-icon">⇄</span>
        </button>
      </div>

      <!-- Target section -->
      <section class="panel panel-target">
        <div class="panel-header">
          <label for="targetLang" class="panel-label">Vers&nbsp;:</label>
          <div class="select-wrapper">
            <select id="targetLang" aria-label="Langue cible">
              <optgroup label="─── Populaires ───">
                <option value="en">🇬🇧 Anglais</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="es">🇪🇸 Espagnol</option>
                <option value="de">🇩🇪 Allemand</option>
                <option value="it">🇮🇹 Italien</option>
                <option value="pt">🇵🇹 Portugais</option>
                <option value="ru">🇷🇺 Russe</option>
                <option value="zh">🇨🇳 Chinois</option>
                <option value="ja">🇯🇵 Japonais</option>
                <option value="ko">🇰🇷 Coréen</option>
                <option value="ar">🇸🇦 Arabe</option>
              </optgroup>
              <optgroup label="─── Autres ───">
                <option value="nl">🇳🇱 Néerlandais</option>
                <option value="pl">🇵🇱 Polonais</option>
                <option value="sv">🇸🇪 Suédois</option>
                <option value="tr">🇹🇷 Turc</option>
                <option value="vi">🇻🇳 Vietnamien</option>
                <option value="th">🇹🇭 Thaï</option>
                <option value="hi">🇮🇳 Hindi</option>
                <option value="he">🇮🇱 Hébreu</option>
                <option value="uk">🇺🇦 Ukrainien</option>
                <option value="ro">🇷🇴 Roumain</option>
                <option value="cs">🇨🇿 Tchèque</option>
                <option value="hu">🇭🇺 Hongrois</option>
                <option value="id">🇮🇩 Indonésien</option>
                <option value="da">🇩🇰 Danois</option>
                <option value="fi">🇫🇮 Finnois</option>
                <option value="el">🇬🇷 Grec</option>
                <option value="no">🇳🇴 Norvégien</option>
                <option value="sk">🇸🇰 Slovaque</option>
                <option value="bg">🇧🇬 Bulgare</option>
                <option value="hr">🇭🇷 Croate</option>
                <option value="ms">🇲🇾 Malais</option>
                <option value="fa">🇮🇷 Persan</option>
                <option value="bn">🇧🇩 Bengali</option>
                <option value="ca">🏴 Catalan</option>
              </optgroup>
            </select>
            <span class="select-arrow">▾</span>
          </div>
        </div>

        <div class="textarea-wrapper">
          <textarea id="resultText" placeholder="La traduction apparaîtra ici…" readonly aria-label="Texte traduit"
            aria-live="polite"></textarea>
          <div class="textarea-tools">
            <span id="translateTime" class="translate-time" hidden></span>
            <button id="copyResultBtn" class="icon-btn" title="Copier la traduction"
              aria-label="Copier la traduction">📋</button>
            <button id="speakBtn" class="icon-btn" title="Écouter" aria-label="Écouter la traduction">🔊</button>
          </div>
        </div>
      </section>

      <!-- Translate Button -->
      <button id="translateBtn" class="translate-btn" aria-label="Lancer la traduction">
        <span class="btn-icon">✨</span>
        <span class="btn-text">Traduire</span>
        <span class="btn-loader" hidden>
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-linecap="round"
              stroke-dasharray="31.4 31.4" transform="rotate(-90 12 12)" />
          </svg>
        </span>
      </button>

      <!-- Error message -->
      <div id="errorMsg" class="error-msg" role="alert" hidden></div>

    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>Propulsé par <a href="https://mymemory.translated.net" target="_blank" rel="noopener">MyMemory API</a> &bull;
        Gratuit &amp; Sans publicité</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>

</html>
